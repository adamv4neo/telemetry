<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKASA EVO-2 | TPMS Top View</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #0a0f1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Rajdhani', sans-serif;
            padding: 20px;
        }

        /* Main Container - Akasa Evo-2 Style */
        .tpms-container {
            background: #0c1424;
            border: 2px solid #2a3a5a;
            border-radius: 30px;
            padding: 30px;
            max-width: 1200px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,100,255,0.2);
            position: relative;
            overflow: hidden;
        }

        /* Grid pattern background */
        .tpms-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 150, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Header Section - Designer Info */
        .tpms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 15px;
            position: relative;
            z-index: 2;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .akasa-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #00a8ff;
            letter-spacing: 4px;
            text-shadow: 0 0 20px #00a8ff;
            background: rgba(0,168,255,0.1);
            padding: 8px 20px;
            border-radius: 10px;
            border: 1px solid rgba(0,168,255,0.3);
        }

        .model-name {
            font-size: 16px;
            color: #8aa4bc;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #2a3a5a;
        }

        .designer-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            background: rgba(0,0,0,0.4);
            padding: 12px 25px;
            border-radius: 40px;
            border: 1px solid #2a3a5a;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            color: #5a7a9a;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .info-value {
            color: #00a8ff;
            font-weight: 700;
            font-size: 16px;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Main Title */
        .main-title {
            text-align: center;
            margin: 20px 0 30px;
            position: relative;
            z-index: 2;
        }

        .main-title h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px #00a8ff;
            letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(0,168,255,0.5);
        }

        .main-title .sub {
            color: #5a7a9a;
            font-size: 14px;
            letter-spacing: 8px;
            margin-top: -5px;
        }

        /* Scale Indicator */
        .scale-indicator {
            position: absolute;
            top: 140px;
            right: 50px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid #2a3a5a;
            z-index: 3;
        }

        .scale-indicator span {
            color: #ffaa00;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
        }

        /* TPMS Top View Canvas */
        .tpms-canvas {
            position: relative;
            width: 100%;
            height: 600px;
            margin: 20px 0;
            background: #0a101f;
            border-radius: 50px;
            border: 3px solid #1a2a40;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            z-index: 2;
        }

        /* SVG untuk gambar tampak atas */
        .car-top-view {
            width: 100%;
            height: 100%;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Sensor positions - dari gambar referensi */
        .sensor-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            fill: #00a8ff;
            text-shadow: 0 0 10px #00a8ff;
        }

        .sensor-value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            font-weight: 600;
        }

        .pressure-value {
            fill: #ffffff;
        }

        .temp-value {
            fill: #ff9933;
            font-size: 12px;
        }

        /* Sensor nodes */
        .sensor-node {
            filter: drop-shadow(0 0 15px currentColor);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Wheel numbers dari gambar (1265, 1170, dll) */
        .wheel-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            fill: #2a3a5a;
            opacity: 0.3;
        }

        /* Dimension lines */
        .dim-line {
            stroke: #2a3a5a;
            stroke-width: 1;
            stroke-dasharray: 5,5;
        }

        .dim-text {
            fill: #5a7a9a;
            font-size: 14px;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Footer Info */
        .tpms-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding: 20px 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            border: 1px solid #2a3a5a;
            position: relative;
            z-index: 2;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-icon {
            width: 40px;
            height: 40px;
            background: rgba(0,168,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,168,255,0.3);
        }

        .footer-icon i {
            color: #00a8ff;
            font-size: 20px;
        }

        .footer-text {
            font-family: 'Share Tech Mono', monospace;
        }

        .footer-text .label {
            color: #5a7a9a;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .footer-text .value {
            color: white;
            font-size: 16px;
            font-weight: 700;
        }

        .footer-right {
            font-family: 'Orbitron', sans-serif;
            color: #ffaa00;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8aa4bc;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 15px #00ff88;
        }

        .status-dot.warning {
            background: #ffaa00;
            box-shadow: 0 0 15px #ffaa00;
        }

        .status-dot.danger {
            background: #ff3d3d;
            box-shadow: 0 0 15px #ff3d3d;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .tpms-header {
                flex-direction: column;
                gap: 20px;
            }
            .main-title h1 {
                font-size: 32px;
                letter-spacing: 4px;
            }
            .tpms-canvas {
                height: 450px;
            }
        }
    </style>
</head>
<body>
    <div class="tpms-container">
        <!-- Header dengan info designer -->
        <div class="tpms-header">
            <div class="title-section">
                <div class="akasa-logo">AKASA</div>
                <div class="model-name">EVO-2</div>
            </div>
            <div class="designer-info">
                <div class="info-item">
                    <div class="info-label">Designer</div>
                    <div class="info-value">Danu Sulthen</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Checked</div>
                    <div class="info-value">Yahya Zakaria</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Approved</div>
                    <div class="info-value">Akasa Evo-2</div>
                </div>
            </div>
        </div>

        <!-- Main Title -->
        <div class="main-title">
            <h1>TPMS TOP VIEW</h1>
            <div class="sub">TIRE PRESSURE MONITORING SYSTEM</div>
        </div>

        <!-- Scale Indicator -->
        <div class="scale-indicator">
            <span>⚡ 1:17 SCALE</span>
        </div>

        <!-- TPMS Canvas - Top View -->
        <div class="tpms-canvas">
            <svg viewBox="0 0 1000 600" class="car-top-view">
                <!-- Background grid -->
                <defs>
                    <pattern id="grid" patternUnits="userSpaceOnUse" width="40" height="40">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a40" stroke-width="1"/>
                    </pattern>
                </defs>
                <rect width="1000" height="600" fill="#0a101f"/>
                <rect width="1000" height="600" fill="url(#grid)"/>

                <!-- Dimension Lines - dari gambar (1265, 1170, dll) -->
                <!-- Panjang total -->
                <line x1="100" y1="100" x2="900" y2="100" class="dim-line"/>
                <text x="480" y="80" class="dim-text">3030 mm (Total Length)</text>
                
                <!-- Wheelbase dimensions -->
                <line x1="200" y1="150" x2="450" y2="150" class="dim-line"/>
                <text x="300" y="130" class="dim-text">1265</text>
                
                <line x1="450" y1="150" x2="650" y2="150" class="dim-line"/>
                <text x="520" y="130" class="dim-text">1170</text>
                
                <line x1="650" y1="150" x2="850" y2="150" class="dim-line"/>
                <text x="720" y="130" class="dim-text">900</text>

                <!-- Side dimensions -->
                <line x1="100" y1="200" x2="100" y2="400" class="dim-line"/>
                <text x="50" y="300" class="dim-text">1510</text>
                
                <line x1="900" y1="200" x2="900" y2="400" class="dim-line"/>
                <text x="910" y="300" class="dim-text">620</text>

                <!-- Center line -->
                <line x1="100" y1="300" x2="900" y2="300" stroke="#2a3a5a" stroke-width="2" stroke-dasharray="10,10" opacity="0.3"/>

                <!-- Car body outline (top view) -->
                <path d="M 150 250 L 200 200 L 800 200 L 850 250 L 850 350 L 800 400 L 200 400 L 150 350 Z" 
                      fill="rgba(20,40,80,0.6)" stroke="#2a5a9a" stroke-width="3"/>
                
                <!-- Windshield area -->
                <path d="M 250 220 L 350 220 L 340 260 L 260 260 Z" fill="rgba(100,150,255,0.2)" stroke="#3a6ab0" stroke-width="2"/>
                <path d="M 650 220 L 750 220 L 740 260 L 660 260 Z" fill="rgba(100,150,255,0.2)" stroke="#3a6ab0" stroke-width="2"/>

                <!-- WHEEL POSITIONS - TPMS Sensors -->
                <!-- Front Left Wheel (FL) -->
                <g transform="translate(200, 250)">
                    <circle cx="0" cy="0" r="45" fill="none" stroke="#00a8ff" stroke-width="3" stroke-dasharray="5,5"/>
                    <circle cx="0" cy="0" r="35" fill="rgba(0,168,255,0.1)" stroke="#00a8ff" stroke-width="2"/>
                    <circle cx="0" cy="0" r="8" fill="#00a8ff" class="sensor-node"/>
                    <!-- Sensor data -->
                    <text x="-30" y="-40" class="sensor-label">FL</text>
                    <text x="-30" y="-20" class="sensor-value pressure-value">32 PSI</text>
                    <text x="-30" y="-5" class="temp-value">42°C</text>
                    <!-- Wheel number from image -->
                    <text x="40" y="-30" class="wheel-number">1265</text>
                </g>

                <!-- Front Right Wheel (FR) -->
                <g transform="translate(450, 250)">
                    <circle cx="0" cy="0" r="45" fill="none" stroke="#00a8ff" stroke-width="3" stroke-dasharray="5,5"/>
                    <circle cx="0" cy="0" r="35" fill="rgba(0,168,255,0.1)" stroke="#00a8ff" stroke-width="2"/>
                    <circle cx="0" cy="0" r="8" fill="#00a8ff" class="sensor-node"/>
                    <text x="10" y="-40" class="sensor-label">FR</text>
                    <text x="10" y="-20" class="sensor-value pressure-value">33 PSI</text>
                    <text x="10" y="-5" class="temp-value">41°C</text>
                    <text x="-60" y="-30" class="wheel-number">1170</text>
                </g>

                <!-- Rear Left Wheel (RL) -->
                <g transform="translate(650, 250)">
                    <circle cx="0" cy="0" r="45" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="5,5"/>
                    <circle cx="0" cy="0" r="35" fill="rgba(255,170,0,0.1)" stroke="#ffaa00" stroke-width="2"/>
                    <circle cx="0" cy="0" r="8" fill="#ffaa00" class="sensor-node"/>
                    <text x="-30" y="-40" class="sensor-label" fill="#ffaa00">RL</text>
                    <text x="-30" y="-20" class="sensor-value pressure-value" fill="#ffffff">35 PSI</text>
                    <text x="-30" y="-5" class="temp-value" fill="#ff9933">48°C</text>
                    <text x="40" y="-30" class="wheel-number">900</text>
                </g>

                <!-- Rear Right Wheel (RR) -->
                <g transform="translate(850, 250)">
                    <circle cx="0" cy="0" r="45" fill="none" stroke="#ff3d3d" stroke-width="3" stroke-dasharray="5,5"/>
                    <circle cx="0" cy="0" r="35" fill="rgba(255,61,61,0.1)" stroke="#ff3d3d" stroke-width="2"/>
                    <circle cx="0" cy="0" r="8" fill="#ff3d3d" class="sensor-node"/>
                    <text x="10" y="-40" class="sensor-label" fill="#ff3d3d">RR</text>
                    <text x="10" y="-20" class="sensor-value pressure-value" fill="#ffffff">28 PSI</text>
                    <text x="10" y="-5" class="temp-value" fill="#ff3d3d">52°C</text>
                    <text x="-70" y="-30" class="wheel-number">620</text>
                </g>

                <!-- Additional dimension numbers from image -->
                <text x="450" y="500" class="wheel-number" font-size="20">1510</text>
                <text x="800" y="500" class="wheel-number" font-size="20">880</text>
                <text x="200" y="550" class="wheel-number" font-size="20">3030</text>
                <text x="500" y="550" class="wheel-number" font-size="20">1050</text>

                <!-- TPMS Signal Icons -->
                <g transform="translate(500, 350)">
                    <circle cx="0" cy="0" r="30" fill="none" stroke="#00ff88" stroke-width="2" stroke-dasharray="3,3"/>
                    <circle cx="0" cy="0" r="20" fill="none" stroke="#00ff88" stroke-width="2" stroke-dasharray="3,3"/>
                    <circle cx="0" cy="0" r="10" fill="none" stroke="#00ff88" stroke-width="2"/>
                    <text x="40" y="-10" fill="#00ff88" font-size="12">RF</text>
                </g>

                <!-- Center TPMS Hub -->
                <g transform="translate(500, 250)">
                    <circle cx="0" cy="0" r="25" fill="rgba(0,168,255,0.2)" stroke="#00a8ff" stroke-width="2"/>
                    <circle cx="0" cy="0" r="10" fill="#00a8ff" class="sensor-node"/>
                    <text x="30" y="5" fill="#00a8ff" font-size="12">TPMS</text>
                </g>
            </svg>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot"></span>
                <span>FL: 32 PSI (Normal)</span>
            </div>
            <div class="status-item">
                <span class="status-dot"></span>
                <span>FR: 33 PSI (Normal)</span>
            </div>
            <div class="status-item">
                <span class="status-dot warning"></span>
                <span>RL: 35 PSI (Warm)</span>
            </div>
            <div class="status-item">
                <span class="status-dot danger"></span>
                <span>RR: 28 PSI (Low!)</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="tpms-footer">
            <div class="footer-left">
                <div class="footer-item">
                    <div class="footer-icon">
                        <i class="fas fa-car"></i>
                    </div>
                    <div class="footer-text">
                        <div class="label">Vehicle</div>
                        <div class="value">Akasa Evo-2</div>
                    </div>
                </div>
                <div class="footer-item">
                    <div class="footer-icon">
                        <i class="fas fa-weight-hanging"></i>
                    </div>
                    <div class="footer-text">
                        <div class="label">Weight</div>
                        <div class="value">1510 kg</div>
                    </div>
                </div>
                <div class="footer-item">
                    <div class="footer-icon">
                        <i class="fas fa-tachometer-alt"></i>
                    </div>
                    <div class="footer-text">
                        <div class="label">Pressure Unit</div>
                        <div class="value">PSI / kPa</div>
                    </div>
                </div>
            </div>
            <div class="footer-right">
                <i class="fas fa-bolt"></i> TPMS ACTIVE <i class="fas fa-bolt"></i>
            </div>
        </div>
    </div>
</body>
</html>
